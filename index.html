<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle Master: Ultimate Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap');

        :root {
            --bg: #0a0a0b;
            --accent: #ffd700;
            --text: #ffffff;
            --theme-color: #00ffcc;
            --error: #ff4444;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .scene {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none; transition: all 0.4s ease;
        }
        .scene.active { opacity: 1; pointer-events: auto; }

        /* 타이틀 화면 */
        #scene-title { justify-content: center; }
        .title-btn-group { display: flex; flex-direction: column; gap: 12px; width: 240px; }
        
        /* 결과 화면 레이아웃 */
        #scene-result { justify-content: center; }
        .result-content-wrapper {
            display: flex; flex-direction: column; align-items: center;
            min-height: 580px; 
            justify-content: center;
        }

        /* 점수 표시 (가이드라인 내부 중앙 하단) */
        .score-info-group { margin-top: 40px; display: flex; flex-direction: column; align-items: center; }
        #result-score { font-size: 6.5rem; font-weight: 900; margin: 0; color: var(--theme-color); text-shadow: 0 0 30px var(--theme-color); }

        /* 하단 액션바 */
        .bottom-action-bar { margin-top: 45px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .horizontal-btns { display: flex; gap: 10px; }

        /* 버튼 스타일 */
        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: #fff; border-radius: 2px; font-size: 0.75rem;
            font-weight: 700; cursor: pointer; transition: 0.3s; letter-spacing: 2px;
            text-transform: uppercase; outline: none; box-sizing: border-box;
        }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }
        .btn-main { border-width: 2px; border-color: #fff; width: 100%; padding: 18px 0; font-size: 0.85rem; }
        .btn-action { padding: 12px 20px; min-width: 90px; }
        .btn-red { border-color: var(--error); color: var(--error); }
        .btn-red:hover { background: var(--error); color: #fff; }
        .btn-theme { border-color: var(--theme-color); color: var(--theme-color); }
        .btn-theme:hover { background: var(--theme-color); color: #000; }

        /* 닉네임 입력 */
        #name-input-wrap { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        #nickname {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 12px; text-align: center; border-radius: 2px;
            font-family: 'Montserrat'; font-size: 1rem; width: 200px; outline: none;
        }

        /* 랭킹 & 테마 선택 */
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.97);
            backdrop-filter: blur(25px); z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #overlay.active { opacity: 1; pointer-events: auto; }
        .palette { display: flex; gap: 12px; margin: 20px 0; }
        .color-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-opt.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 20px currentColor; }
        .rank-list { width: 300px; max-height: 35vh; overflow-y: auto; margin-bottom: 20px; scrollbar-width: none; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .loading-text { font-size: 0.85rem; color: #fff; letter-spacing: 3px; font-weight: 900; animation: pulse 1s infinite; margin: 20px; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* 중앙 HUD (숫자 + 프로그레스바) */
        #hud-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        #hud-timer.active { opacity: 1; }
        #timer-num { font-size: 3.5rem; font-weight: 900; color: var(--theme-color); text-shadow: 0 0 20px var(--theme-color); margin-bottom: -5px; }
        #timer-bar-container { width: 80px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        #timer-bar-inner { width: 100%; height: 100%; background: var(--theme-color); transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="hud-timer">
        <div id="timer-num">5.0</div>
        <div id="timer-bar-container"><div id="timer-bar-inner"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="scene-title" class="scene active">
        <h1 style="font-size: 4rem; font-weight: 900; letter-spacing: -3px; margin: 0 0 50px 0;">CIRCLE</h1>
        <div class="title-btn-group">
            <button onclick="startGame()" class="btn btn-main">Start Trace</button>
            <button onclick="openMenu()" class="btn" style="padding: 14px 0; border-color: rgba(255,255,255,0.2); font-size: 0.7rem;">Global Ranking</button>
        </div>
    </div>

    <div id="scene-result" class="scene">
        <div class="result-content-wrapper">
            <div class="score-info-group">
                <h2 id="result-score">0.00</h2>
            </div>
            
            <div id="name-input-wrap">
                <input type="text" id="nickname" maxlength="8" placeholder="NICKNAME" autocomplete="off">
                <button id="save-btn" onclick="handleSaveScore()" class="btn btn-theme" style="margin-top: 15px; padding: 12px; width: 100%; font-size: 0.7rem;">Register Score</button>
            </div>

            <div class="bottom-action-bar">
                <div class="horizontal-btns">
                    <button onclick="startGame()" class="btn btn-action">Retry</button>
                    <button onclick="goTitle()" class="btn btn-action btn-red">Exit</button>
                    <button onclick="openMenu()" class="btn btn-action">Rank</button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div style="font-size: 0.8rem; letter-spacing: 4px; font-weight: 900;">WORLD TOP 10</div>
        <div id="rank-loader" class="loading-text" style="display: none;">SYNCING...</div>
        <div id="rank-list" class="rank-list"></div>

        <div style="font-size: 0.6rem; letter-spacing: 3px; color: #555; font-weight: 900;">CUSTOM THEME</div>
        <div class="palette">
            <div class="color-opt active" style="background: #00ffcc; color: #00ffcc;" onclick="setTheme('#00ffcc', this)"></div>
            <div class="color-opt" style="background: #ff2d55; color: #ff2d55;" onclick="setTheme('#ff2d55', this)"></div>
            <div class="color-opt" style="background: #ffcc00; color: #ffcc00;" onclick="setTheme('#ffcc00', this)"></div>
            <div class="color-opt" style="background: #007aff; color: #007aff;" onclick="setTheme('#007aff', this)"></div>
            <div class="color-opt" style="background: #af52de; color: #af52de;" onclick="setTheme('#af52de', this)"></div>
        </div>

        <button onclick="closeMenu()" class="btn btn-action" style="width: 200px;">Resume</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxdFhNWueOg5sTcmDjlr1jUBxyKLoV1Mxh-CwjyAenKXp9AFR5qJHGcSIL-dNAAk6Xk/exec";
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hudTimer = document.getElementById('hud-timer');
        const timerNum = document.getElementById('timer-num');
        const timerBarInner = document.getElementById('timer-bar-inner');
        
        let width, height, centerX, centerY;
        const radius = 220; 
        let points = [];
        let drawing = false;
        let startTime = null;
        let timerRequest = null;
        const TIME_LIMIT = 5000;
        let currentFinalScore = 0;

        let themeColor = '#00ffcc';
        function setTheme(color, el) {
            themeColor = color;
            document.documentElement.style.setProperty('--theme-color', color);
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active'));
            if(el) el.classList.add('active');
            localStorage.setItem('circle_theme', color);
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            centerX = width / 2; centerY = height / 2;
            refreshCanvas();
        }
        window.addEventListener('resize', resize);
        resize();

        function refreshCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 4;
            ctx.setLineDash([8, 12]); ctx.stroke(); ctx.setLineDash([]);
        }

        function startGame() {
            cancelAnimationFrame(timerRequest);
            points = []; startTime = null;
            timerNum.innerText = "5.0";
            timerBarInner.style.width = '100%';
            hudTimer.classList.remove('active');
            refreshCanvas();
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('name-input-wrap').style.display = "flex";
            document.getElementById('save-btn').innerText = "Register Score";
            document.getElementById('save-btn').disabled = false;
        }

        function updateTimer() {
            if (!startTime) return;
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, TIME_LIMIT - elapsed);
            timerNum.innerText = (remaining / 1000).toFixed(1);
            timerBarInner.style.width = (remaining / TIME_LIMIT) * 100 + '%';
            if (remaining <= 0) endDrawing();
            else timerRequest = requestAnimationFrame(updateTimer);
        }

        function goTitle() {
            cancelAnimationFrame(timerRequest);
            points = []; refreshCanvas();
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById('scene-title').classList.add('active');
        }

        function openMenu() { document.getElementById('overlay').classList.add('active'); loadRankFromServer(); }
        function closeMenu() { document.getElementById('overlay').classList.remove('active'); }

        canvas.addEventListener('mousedown', (e) => {
            if(document.querySelector('.scene.active:not(#scene-title)')) return;
            drawing = true; points = []; startTime = Date.now();
            hudTimer.classList.add('active');
            updateTimer(); refreshCanvas();
        });

        window.addEventListener('mousemove', (e) => {
            if(!drawing) return;
            const t = e.touches ? e.touches[0] : e;
            const pos = { x: t.clientX, y: t.clientY };
            ctx.beginPath(); ctx.lineWidth = 12; ctx.lineCap = 'round';
            ctx.strokeStyle = themeColor;
            const last = points[points.length - 1] || pos;
            ctx.moveTo(last.x, last.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
            points.push(pos);
        });

        window.addEventListener('mouseup', endDrawing);

        function endDrawing() {
            if(!drawing) return;
            drawing = false; cancelAnimationFrame(timerRequest);
            hudTimer.classList.remove('active');
            if(points.length > 20) calculate();
            else refreshCanvas();
        }

        function calculate() {
            const dists = points.map(p => Math.hypot(p.x - centerX, p.y - centerY));
            const errors = dists.map(d => Math.abs(d - radius));
            errors.sort((a, b) => a - b);
            const filteredErrors = errors.slice(0, Math.floor(errors.length * 0.95));
            const finalErrors = filteredErrors.map(e => Math.max(0, e - 4));
            const avgError = finalErrors.reduce((a, b) => a + b, 0) / finalErrors.length;
            let baseScore = 100 - (avgError * 3.5);
            const angles = points.map(p => {
                let angle = Math.atan2(p.y - centerY, p.x - centerX) * 180 / Math.PI;
                return angle < 0 ? angle + 360 : angle;
            });
            const bins = new Array(24).fill(false);
            angles.forEach(a => bins[Math.floor(a / 15)] = true);
            const coverage = bins.filter(b => b).length / 24;
            const startPos = points[0]; const endPos = points[points.length - 1];
            const gap = Math.hypot(startPos.x - endPos.x, startPos.y - endPos.y);
            const gapPenalty = Math.pow(gap / 12, 1.5); 
            currentFinalScore = ((baseScore - gapPenalty) * Math.pow(coverage, 1.5)).toFixed(2);
            showResult(currentFinalScore);
        }

        function showResult(targetScore) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById('scene-result').classList.add('active');
            const scoreEl = document.getElementById('result-score');
            const savedTheme = localStorage.getItem('circle_theme') || '#00ffcc';
            setTheme(savedTheme);
            let current = 0; const startTimeAnim = performance.now();
            function step(now) {
                const progress = Math.min((now - startTimeAnim) / 1000, 1);
                current = (1 - Math.pow(1 - progress, 3)) * targetScore;
                scoreEl.innerText = current.toFixed(2);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        async function handleSaveScore() {
            const name = document.getElementById('nickname').value.trim(); if (!name) return;
            const btn = document.getElementById('save-btn'); btn.innerText = "WAIT..."; btn.disabled = true;
            try {
                const url = `${GAS_URL}?action=save&name=${encodeURIComponent(name)}&score=${currentFinalScore}`;
                fetch(url, { mode: 'no-cors' });
                btn.innerText = "DONE ✔"; btn.style.backgroundColor = "var(--theme-color)"; btn.style.color = "#000";
                setTimeout(() => { document.getElementById('name-input-wrap').style.display = "none"; }, 1000);
            } catch (e) { btn.innerText = "FAILED"; btn.disabled = false; }
        }

        async function loadRankFromServer() {
            const list = document.getElementById('rank-list'); const loader = document.getElementById('rank-loader');
            list.innerHTML = ""; loader.style.display = "block";
            try {
                const response = await fetch(`${GAS_URL}?action=get`); const data = await response.json();
                list.innerHTML = data.map((item, i) => `<div class="rank-item"><span>0${i+1} <b>${item[0]}</b></span><b>${parseFloat(item[1]).toFixed(2)}</b></div>`).join('');
            } catch (e) { list.innerHTML = "<div class='loading-text'>ERROR</div>"; }
            finally { loader.style.display = "none"; }
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', {})); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; window.dispatchEvent(new MouseEvent('mousemove', {clientX: t.clientX, clientY: t.clientY})); }, {passive: false});
        canvas.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup', {})));

        const savedTheme = localStorage.getItem('circle_theme');
        if (savedTheme) {
            const target = Array.from(document.querySelectorAll('.color-opt')).find(o => o.style.backgroundColor.includes(savedTheme) || o.getAttribute('onclick').includes(savedTheme));
            setTheme(savedTheme, target);
        }
    </script>
</body>
</html>
